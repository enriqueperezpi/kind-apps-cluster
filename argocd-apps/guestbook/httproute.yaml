apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: guestbook
  namespace: guestbook
spec:
  parentRefs:
  - name: cilium-gateway
    namespace: argocd
  hostnames:
  - "guestbook.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: guestbook
      port: 80
