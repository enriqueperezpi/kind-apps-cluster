# kind-apps-cluster configuration
# ================================
# All settings can be overridden here or via environment variables.

# --- Cluster ---
CLUSTER_NAME="kind-apps-cluster"
K8S_VERSION="v1.33.2"
WORKER_NODES=1

# --- ArgoCD ---
ARGOCD_NAMESPACE="argocd"
ARGOCD_VERSION="stable"  # or a specific version like "v2.13.0"
ARGOCD_APPS_DIR="./argocd-apps"

# --- Gateway API ---
GATEWAY_API_VERSION="v1.2.0"  # Gateway API CRD version
GATEWAY_CLASS_NAME="cloud-provider-kind"

# --- Tool auto-install ---
# Set to "true" to auto-install missing tools (uses brew on macOS, apt on Linux)
AUTO_INSTALL_TOOLS="true"

# --- Ingress ports exposed on kind node ---
HTTP_PORT=80
HTTPS_PORT=443
