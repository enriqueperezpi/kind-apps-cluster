# kind-apps-cluster configuration
# ================================
# All settings can be overridden here or via environment variables.

# --- Cluster ---
CLUSTER_NAME="kind-apps-cluster"
K8S_VERSION="v1.33.2"
WORKER_NODES=1

# --- Networking (CNI) ---
# Options: 
#   "kind" (default kind networking) - works everywhere (macOS, Windows, Linux)
#   "cilium" (Cilium CNI with Gateway API) - requires Linux or Docker with BPF support
# For macOS/Windows: use "kind"
# For full Gateway API support on Linux: use "cilium"
CNI_PLUGIN="kind"

# Cilium options (only used when CNI_PLUGIN="cilium")
CILIUM_VERSION="1.17.2"

# --- Gateway API ---
# Options: "cilium" (Cilium built-in), "envoy-gateway" (Envoy Gateway)
# Note: Cilium requires CNI_PLUGIN="cilium"
GATEWAY_CLASS_NAME="cilium"

# --- ArgoCD ---
ARGOCD_NAMESPACE="argocd"
ARGOCD_VERSION="stable"
ARGOCD_APPS_DIR="./argocd-apps"

# --- Host Ports (exposed via kind node) ---
HTTP_PORT=80
HTTPS_PORT=443

# --- Tool auto-install ---
# Set to "true" to auto-install missing tools (uses brew on macOS, apt on Linux)
AUTO_INSTALL_TOOLS="true"
