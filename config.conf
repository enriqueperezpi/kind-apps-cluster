# kind-apps-cluster configuration
# ================================
# All settings can be overridden here or via environment variables.

# --- Cluster ---
CLUSTER_NAME="kind-apps-cluster"
K8S_VERSION="v1.33.2"
WORKER_NODES=1

# --- Networking (CNI) ---
# Options: "kind" (default kind networking), "cilium" (Cilium CNI with Gateway API)
CNI_PLUGIN="cilium"
CILIUM_VERSION="1.17.2"

# --- Gateway API ---
# Options: "cilium" (Cilium built-in), "envoy-gateway" (Envoy Gateway)
GATEWAY_CLASS_NAME="cilium"

# --- ArgoCD ---
ARGOCD_NAMESPACE="argocd"
ARGOCD_VERSION="stable"  # or a specific version like "v2.13.0"
ARGOCD_APPS_DIR="./argocd-apps"

# --- Host Ports (exposed via kind node) ---
HTTP_PORT=80
HTTPS_PORT=443

# --- Tool auto-install ---
# Set to "true" to auto-install missing tools (uses brew on macOS, apt on Linux)
AUTO_INSTALL_TOOLS="true"
